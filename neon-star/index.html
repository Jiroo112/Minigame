<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>NEON STAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:   #00d2ff;
      --green:  #00ff88;
      --red:    #ff2255;
      --yellow: #ffd700;
      --bg:     #03050f;
      --panel:  rgba(0, 8, 24, 0.97);
      --border: rgba(0, 210, 255, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      width: 400px;
      height: 550px;
    }

    canvas {
      border: 1px solid rgba(0,210,255,0.2);
      cursor: crosshair;
      z-index: 1;
      position: relative;
      background: transparent;
      display: block;
    }

    /* ── Background ── */
    #gridBg {
      position: absolute;
      width: 100%; height: 100%;
      top: 0; left: 0; z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 110%, rgba(0,50,100,0.4) 0%, transparent 60%),
        #03050f;
    }

    #gridLines {
      position: absolute;
      width: 100%; height: 200%;
      top: 0; left: 0;
      background-image:
        linear-gradient(rgba(0,210,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,210,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 2s linear infinite;
    }

    @keyframes gridScroll {
      from { transform: translateY(0); }
      to   { transform: translateY(40px); }
    }

    /* ── HUD ── */
    .ui-layer {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .hud-block { display: flex; flex-direction: column; }
    .hud-block.right { align-items: flex-end; }

    .hud-label {
      font-size: 9px;
      color: rgba(0,210,255,0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: white;
      line-height: 1;
    }

    .hud-value.record { color: var(--yellow); }

    /* ── Ability message ── */
    #abilityMsg {
      position: absolute;
      top: 120px;
      width: 100%;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      display: none;
      z-index: 10;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: white;
    }

    /* ── Overlay panels ── */
    .overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 310px;
      padding: 32px 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      z-index: 100;
      text-align: center;
    }

    /* corner accents */
    .overlay::before, .overlay::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: rgba(0,210,255,0.5);
      border-style: solid;
    }
    .overlay::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .overlay::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    /* ── Title ── */
    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0,210,255,0.35);
      margin: 0 0 28px;
      line-height: 1.1;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,210,255,0.2), transparent);
      margin: 8px 0 20px;
    }

    /* ── Buttons ── */
    .menu-btn {
      width: 100%;
      margin: 4px 0;
      padding: 11px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(0,210,255,0.8);
      background: transparent;
      border: 1px solid rgba(0,210,255,0.2);
      border-radius: 1px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      text-transform: uppercase;
    }

    .menu-btn:hover {
      background: rgba(0,210,255,0.08);
      border-color: rgba(0,210,255,0.5);
      color: white;
    }

    .btn-start {
      color: var(--bg);
      background: var(--green);
      border-color: var(--green);
      font-size: 12px;
      padding: 13px;
      margin-bottom: 12px;
    }
    .btn-start:hover {
      background: white;
      border-color: white;
      color: var(--bg);
    }

    .btn-danger {
      color: rgba(255,34,85,0.7) !important;
      border-color: rgba(255,34,85,0.2) !important;
      background: transparent !important;
    }
    .btn-danger:hover {
      background: rgba(255,34,85,0.08) !important;
      border-color: rgba(255,34,85,0.5) !important;
      color: var(--red) !important;
    }

    /* ── Section headings ── */
    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--cyan);
      margin: 0 0 20px;
    }

    /* ── Ability list ── */
    .ability-list {
      width: 100%;
      margin-bottom: 20px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 10px;
      margin: 4px 0;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 1px;
      font-size: 12px;
      text-align: left;
    }

    .ability-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ability-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      min-width: 60px;
    }

    .ability-desc { color: rgba(255,255,255,0.4); font-size: 11px; }

    /* ── Settings ── */
    .setting-row { width: 100%; margin: 12px 0; }

    .setting-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .setting-val {
      font-family: 'Orbitron', sans-serif;
      color: var(--green);
      font-weight: 700;
    }

    input[type=range] {
      width: 100%;
      height: 2px;
      -webkit-appearance: none;
      background: rgba(0,210,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ── Game Over ── */
    .crash-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--red);
      margin: 0 0 8px;
    }

    .final-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    #finalScore {
      font-family: 'Orbitron', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: white;
      line-height: 1;
      margin: 8px 0 16px;
    }

    #newRecordMsg {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--yellow);
      display: none;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div id="gameContainer">
    <div id="gridBg"><div id="gridLines"></div></div>

    <!-- HUD -->
    <div class="ui-layer">
      <div class="hud-block">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="scoreVal">0</div>
      </div>
      <div class="hud-block right">
        <div class="hud-label">Record</div>
        <div class="hud-value record" id="highScoreVal">0</div>
      </div>
    </div>

    <!-- Ability message -->
    <div id="abilityMsg"></div>

    <!-- Main Menu -->
    <div id="mainMenu" class="overlay">
      <div class="game-title">NEON<br>STAR</div>
      <button id="btn-start"       class="menu-btn btn-start">START GAME</button>
      <button id="btn-how-to-play" class="menu-btn">ABILITY LIST</button>
      <button id="btn-settings"    class="menu-btn">SETTINGS</button>
    </div>

    <!-- How to Play -->
    <div id="infoScreen" class="overlay" style="display:none">
      <div class="panel-title">ABILITIES</div>
      <div class="ability-list">
        <div class="legend-item">
          <div class="ability-dot" style="background:#fff"></div>
          <span class="ability-name" style="color:#fff">SHIELD</span>
          <span class="ability-desc">Absorb one hit</span>
        </div>
        <div class="legend-item">
          <div class="ability-dot" style="background:#ffd700"></div>
          <span class="ability-name" style="color:#ffd700">SLOW-MO</span>
          <span class="ability-desc">Slow all enemies</span>
        </div>
        <div class="legend-item">
          <div class="ability-dot" style="background:#00ff88"></div>
          <span class="ability-name" style="color:#00ff88">SHRINK</span>
          <span class="ability-desc">Smaller hitbox</span>
        </div>
        <div class="legend-item">
          <div class="ability-dot" style="background:#9933ff"></div>
          <span class="ability-name" style="color:#9933ff">BLAST</span>
          <span class="ability-desc">Clear all obstacles</span>
        </div>
      </div>
      <button id="btn-back-info" class="menu-btn">BACK</button>
    </div>

    <!-- Settings -->
    <div id="settingsScreen" class="overlay" style="display:none">
      <div class="panel-title">SETTINGS</div>
      <div class="setting-row">
        <div class="setting-label">
          <span>Sensitivity</span>
          <span class="setting-val" id="sensValDisplay">6</span>
        </div>
        <input type="range" id="sensSlider" min="3" max="11" step="0.5" value="6">
      </div>
      <div class="divider"></div>
      <button id="btn-reset-record" class="menu-btn btn-danger">RESET RECORD</button>
      <button id="btn-save-back"    class="menu-btn">SAVE & BACK</button>
    </div>

    <!-- Game Over -->
    <div id="gameOverModal" class="overlay" style="display:none">
      <div class="crash-title">CRASHED!</div>
      <div class="final-label">Final Score</div>
      <div id="finalScore">0</div>
      <div id="newRecordMsg">NEW RECORD</div>
      <button id="btn-try-again" class="menu-btn btn-start">TRY AGAIN</button>
      <button id="btn-main-menu" class="menu-btn">MAIN MENU</button>
    </div>

    <canvas id="gameCanvas"></canvas>
  </div>

  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="entities.js"></script>
  <script src="input.js"></script>
  <script src="abilities.js"></script>
  <script src="render.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
</body>
</html>
